name: Lint Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Required environment variable for June 2026 standards
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  nextjs-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Dependencies
        working-directory: ./client
        run: npm ci

      - name: Run Next Lint
        working-directory: ./client
        run: npm run lint

      - name: Build Check
        working-directory: ./client
        run: npm run build
        env:
          NODE_ENV: production