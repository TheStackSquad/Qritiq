# pre-deploy-check.yml

name: Pre-Deploy Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm install

      - name: Lint check
        working-directory: ./client
        run: npm run lint

      - name: Type check
        working-directory: ./client
        run: npx tsc --noEmit

      - name: Build check
        working-directory: ./client
        run: npm run build
        env:
          NODE_ENV: production
