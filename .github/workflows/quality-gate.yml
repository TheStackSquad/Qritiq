#.github/workflows/quality-gate.yml

name: Qritiq Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── CLIENT ────────────────────────────────────────────
  client-quality:
    name: Client — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Bundle size report
        run: |
          echo "=== Build output sizes ==="
          du -sh .next/static/chunks/*.js 2>/dev/null | sort -rh | head -20 || true

  # ─── SERVER ────────────────────────────────────────────
  server-quality:
    name: Server — Vet, Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Go Vet
        run: go vet ./...

      - name: Go Build
        run: go build ./...

      - name: Go Tests
        run: go test ./... -timeout 60s -race -coverprofile=coverage.out
        continue-on-error: false

      - name: Coverage Report
        run: go tool cover -func=coverage.out | tail -5
        if: always()

  # ─── SECRETS SCAN ──────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets
        run: |
          echo "Scanning for common secret patterns..."
          FOUND=0

          if grep -rn "sk_live\|pk_live\|AKIA[0-9A-Z]\{16\}" \
            --include="*.go" --include="*.js" --include="*.jsx" \
            --exclude-dir=node_modules --exclude-dir=.next \
            client/ server/ 2>/dev/null; then
            FOUND=1
          fi

          if grep -rEn "(password|secret|token)\s*[:=]\s*['\"][^'\"]{8,}" \
            --include="*.go" \
            server/ 2>/dev/null | grep -v "_test.go"; then
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo "❌ Potential secrets found in code. Review above matches."
            exit 1
          fi

          echo "✅ No secrets patterns detected."

      - name: Check .env files not committed
        run: |
          if find . -name ".env" -o -name ".env.local" -o -name ".env.production" \
            | grep -v node_modules | grep -v .git | grep .; then
            echo "❌ .env files committed to repository"
            exit 1
          fi
          echo "✅ No .env files in repository"

  # ─── LIGHTHOUSE (on PRs only) ──────────────────────────
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: [client-quality]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm install

      - name: Build for Lighthouse
        working-directory: client
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ─── SUMMARY ───────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [client-quality, server-quality, secrets-scan]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.client-quality.result }}" != "success" ]]; then
            echo "❌ Client quality checks failed"
            exit 1
          fi
          if [[ "${{ needs.server-quality.result }}" != "success" ]]; then
            echo "❌ Server quality checks failed"
            exit 1
          fi
          if [[ "${{ needs.secrets-scan.result }}" != "success" ]]; then
            echo "❌ Secrets scan failed"
            exit 1
          fi
          echo "✅ All quality gates passed — safe to merge"